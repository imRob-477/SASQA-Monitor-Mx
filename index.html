<head>

<title>SASQA Web</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800;900&display=swap');
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #f0f4f8; --surface: #ffffff; --border: #e2e8f0;
  --accent: #3b82f6; --safe: #22c55e; --danger: #ef4444;
  --warn: #f97316; --text: #1e293b; --muted: #94a3b8;
}
body { background: var(--bg); color: var(--text); font-family: 'Nunito', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; transition: background 0.5s; }
body.alerta-activa { background: #fff0f0; }
body.moderado-activo { background: #fff8f0; }
.header { display: flex; align-items: center; gap: 8px; margin-bottom: 28px; font-size: 0.75rem; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: var(--muted); }
.header-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--safe); box-shadow: 0 0 8px var(--safe); animation: pulse-dot 2s infinite; }
body.alerta-activa .header-dot { background: var(--danger); box-shadow: 0 0 10px var(--danger); animation: pulse-dot 0.4s infinite; }
body.moderado-activo .header-dot { background: var(--warn); box-shadow: 0 0 10px var(--warn); animation: pulse-dot 1s infinite; }
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }
.clock-main { text-align: center; margin-bottom: 28px; transition: all 0.5s cubic-bezier(0.4,0,0.2,1); }
.clock-time { font-size: clamp(4.5rem, 20vw, 8rem); font-weight: 900; color: var(--text); letter-spacing: -3px; line-height: 1; transition: all 0.5s cubic-bezier(0.4,0,0.2,1); }
.clock-secs { font-size: 1.1rem; font-weight: 600; color: var(--muted); letter-spacing: 1px; margin-top: 4px; transition: all 0.5s; }
.clock-date { font-size: 0.8rem; font-weight: 600; color: var(--muted); letter-spacing: 3px; margin-top: 6px; text-transform: uppercase; transition: all 0.5s; }
body.alerta-activa .clock-main { margin-bottom: 14px; }
body.alerta-activa .clock-time { font-size: clamp(2rem, 9vw, 3rem); color: #f87171; letter-spacing: 0; }
body.alerta-activa .clock-date, body.alerta-activa .clock-secs { opacity: 0.4; }
body.moderado-activo .clock-time { color: var(--warn); }
.logo-img { width: 100%; max-width: 460px; border-radius: 16px; margin-bottom: 20px; display: block; }
.alerta-banner { display: none; width: 100%; max-width: 460px; background: var(--danger); border-radius: 16px; padding: 28px 24px 22px; text-align: center; margin-bottom: 20px; box-shadow: 0 8px 40px rgba(239,68,68,0.35); position: relative; overflow: hidden; }
.alerta-banner.show { display: block; animation: aparecer 0.4s ease, shake 0.5s infinite 0.3s; }
.alerta-banner::before { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(45deg, rgba(255,255,255,0.05) 0px, rgba(255,255,255,0.05) 10px, transparent 10px, transparent 20px); }
.alerta-icon { font-size: 2.8rem; display: block; margin-bottom: 8px; animation: bounce-icon 0.7s infinite; }
.alerta-titulo { font-size: 2rem; font-weight: 900; letter-spacing: 4px; color: white; text-transform: uppercase; }
.alerta-sub { font-size: 0.8rem; font-weight: 700; letter-spacing: 2px; color: rgba(255,255,255,0.8); margin-top: 6px; text-transform: uppercase; }
.alerta-hora { font-size: 0.7rem; font-weight: 600; color: rgba(255,255,255,0.55); margin-top: 10px; letter-spacing: 1px; }
.moderado-banner { display: none; width: 100%; max-width: 460px; background: var(--warn); border-radius: 16px; padding: 22px 24px 18px; text-align: center; margin-bottom: 20px; box-shadow: 0 8px 30px rgba(249,115,22,0.3); position: relative; overflow: hidden; }
.moderado-banner.show { display: block; animation: aparecer 0.4s ease; }
.moderado-banner::before { content: ''; position: absolute; inset: 0; background: repeating-linear-gradient(45deg, rgba(255,255,255,0.05) 0px, rgba(255,255,255,0.05) 10px, transparent 10px, transparent 20px); }
.moderado-icon { font-size: 2.2rem; display: block; margin-bottom: 6px; }
.moderado-titulo { font-size: 1.6rem; font-weight: 900; letter-spacing: 3px; color: white; text-transform: uppercase; }
.moderado-sub { font-size: 0.75rem; font-weight: 700; letter-spacing: 2px; color: rgba(255,255,255,0.8); margin-top: 5px; text-transform: uppercase; }
.moderado-hora { font-size: 0.7rem; font-weight: 600; color: rgba(255,255,255,0.55); margin-top: 8px; }
@keyframes aparecer { from{opacity:0;transform:scale(0.9)} to{opacity:1;transform:scale(1)} }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-3px)} 40%{transform:translateX(3px)} 60%{transform:translateX(-2px)} 80%{transform:translateX(2px)} }
@keyframes bounce-icon { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
.status-bar { display: flex; align-items: center; gap: 8px; font-size: 0.7rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 20px; padding: 8px 18px; border-radius: 100px; background: var(--surface); border: 1px solid var(--border); box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: #cbd5e1; }
.status-dot.on { background: var(--safe); box-shadow: 0 0 6px var(--safe); }
.status-dot.off { background: var(--danger); }
.admin-card { width: 100%; max-width: 460px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 22px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); }
.admin-label { font-size: 0.65rem; font-weight: 800; letter-spacing: 4px; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
.input-pass { width: 100%; background: var(--bg); border: 1.5px solid var(--border); color: var(--text); padding: 12px 16px; font-family: 'Nunito', sans-serif; font-size: 0.9rem; font-weight: 600; border-radius: 10px; margin-bottom: 12px; outline: none; transition: border-color 0.2s; }
.input-pass:focus { border-color: var(--accent); }
.input-pass.error-shake { border-color: var(--danger); animation: shake-input 0.35s; }
@keyframes shake-input { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
.msg-error { font-size: 0.7rem; font-weight: 700; color: var(--danger); letter-spacing: 1px; margin-top: -6px; margin-bottom: 10px; display: none; }
.btns { display: flex; gap: 8px; flex-wrap: wrap; }
.btn { flex: 1; min-width: 120px; padding: 13px 10px; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 0.85rem; letter-spacing: 1px; border: none; border-radius: 10px; cursor: pointer; transition: transform 0.1s, box-shadow 0.2s; text-transform: uppercase; }
.btn:active { transform: scale(0.96); }
.btn-enviar { background: var(--danger); color: white; box-shadow: 0 4px 16px rgba(239,68,68,0.25); }
.btn-enviar:hover { box-shadow: 0 6px 24px rgba(239,68,68,0.4); }
.btn-moderado { background: var(--warn); color: white; box-shadow: 0 4px 16px rgba(249,115,22,0.25); }
.btn-moderado:hover { box-shadow: 0 6px 24px rgba(249,115,22,0.4); }
.btn-ok { background: var(--bg); color: var(--muted); border: 1.5px solid var(--border); }
.btn-ok:hover { color: var(--text); }
.divider { width: 100%; height: 1px; background: var(--border); margin: 12px 0; }
.btn-prueba { background: #7c3aed; color: #fff; border: none; }
.btn-prueba:hover { background: #6d28d9; }
.modal-prueba {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); z-index: 999;
  align-items: center; justify-content: center;
}
.modal-prueba.show { display: flex; }
.modal-prueba-box {
  background: #1e1b4b; border: 2px solid #7c3aed;
  border-radius: 16px; padding: 32px 28px;
  max-width: 420px; width: 90%; text-align: center;
}
.modal-prueba-titulo {
  font-size: 1.3rem; font-weight: 800;
  color: #a78bfa; margin-bottom: 10px;
}
.modal-prueba-subtitulo {
  font-size: 0.95rem; color: #c4b5fd; margin-bottom: 18px;
}
.modal-prueba-advertencia {
  background: rgba(239,68,68,0.12); border: 2px solid #ef4444;
  border-radius: 10px; padding: 12px 16px;
  font-size: 1rem; font-weight: 800;
  color: #ef4444; margin-bottom: 22px; letter-spacing: 0.02em;
}
.modal-prueba-cerrar {
  background: #7c3aed; color: #fff; border: none;
  border-radius: 8px; padding: 10px 28px;
  font-size: 0.95rem; font-weight: 700; cursor: pointer;
}
.modal-prueba-cerrar:hover { background: #6d28d9; }

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD0dDn6wwP0kmxT0TWTlH55-PrxRCCzJ3U",
    authDomain: "sasqafirst.firebaseapp.com",
    databaseURL: "https://sasqafirst-default-rtdb.firebaseio.com",
    projectId: "sasqafirst",
    storageBucket: "sasqafirst.firebasestorage.app",
    messagingSenderId: "99516429262",
    appId: "1:99516429262:web:eaf2d8b9d19cb0f448319f"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const auth = getAuth(app);

  // ── Tono moderado generado con Web Audio API ───────
  function activarSonido() {
    const audio = document.getElementById('audioAlerta');
    audio.play().then(() => {
      audio.pause();
      audio.currentTime = 0;
    }).catch(() => {});
    const btn = document.getElementById('btnActivarSonido');
    btn.textContent = '✅ Sonido activado';
    btn.style.background = '#16a34a';
    btn.disabled = true;
    btn.style.cursor = 'default';
    btn.style.opacity = '0.85';
  }

  function tonoModerado() {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const tiempos = [0, 0.6, 1.2];
    tiempos.forEach(t => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(520, ctx.currentTime + t);
      osc.frequency.linearRampToValueAtTime(440, ctx.currentTime + t + 0.4);
      gain.gain.setValueAtTime(0.4, ctx.currentTime + t);
      gain.gain.linearRampToValueAtTime(0, ctx.currentTime + t + 0.45);
      osc.start(ctx.currentTime + t);
      osc.stop(ctx.currentTime + t + 0.5);
    });
  }

  // ── Reloj ──────────────────────────────────────────
  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    const s = String(now.getSeconds()).padStart(2,'0');
    document.getElementById('clockTime').textContent = `${h}:${m}`;
    document.getElementById('clockSecs').textContent = `:${s}`;
    const dias = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
    const meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    document.getElementById('clockDate').textContent =
      `${dias[now.getDay()]} ${now.getDate()} ${meses[now.getMonth()]} ${now.getFullYear()}`;
  }
  setInterval(updateClock, 1000);
  updateClock();

  // ── Conexión ───────────────────────────────────────
  onValue(ref(db, '.info/connected'), snap => {
    const on = snap.val() === true;
    document.getElementById('statusDot').className = 'status-dot ' + (on ? 'on' : 'off');
    document.getElementById('statusText').textContent = on ? 'Conectado en tiempo real' : 'Sin conexión';
  });

  // ── Escuchar alertas ───────────────────────────────
  let tipoAnterior = 'ninguno';
  onValue(ref(db, 'alerta'), snap => {
    const data = snap.val();
    const tipo = data?.tipo || 'ninguno';
    const hora = data?.hora || '';

    const alertaBanner   = document.getElementById('alertaBanner');
    const moderadoBanner = document.getElementById('moderadoBanner');
    const body           = document.body;
    const headerLabel    = document.getElementById('headerLabel');

    alertaBanner.classList.remove('show');
    moderadoBanner.classList.remove('show');
    body.classList.remove('alerta-activa','moderado-activo');

    if (tipo === 'fuerte') {
      alertaBanner.classList.add('show');
      body.classList.add('alerta-activa');
      document.getElementById('alertaHora').textContent = hora;
      headerLabel.textContent = '¡ALERTA ACTIVA!';
      if (tipoAnterior !== 'fuerte') {
        const audio = document.getElementById('audioAlerta');
        audio.currentTime = 0;
        audio.play().catch(() => {});
        enviarNotificacionPush('🚨 ALERTA SÍSMICA', 'Se ha detectado un sismo fuerte. Toma precauciones.');
      }
    } else if (tipo === 'moderado') {
      moderadoBanner.classList.add('show');
      body.classList.add('moderado-activo');
      document.getElementById('moderadoHora').textContent = hora;
      headerLabel.textContent = 'Sismo moderado';
      if (tipoAnterior !== 'moderado') {
        tonoModerado();
        enviarNotificacionPush('⚠️ Sismo Moderado', 'Se ha detectado un sismo moderado en la red.');
      }
    } else {
      headerLabel.textContent = 'Sistema activo';
    }

    tipoAnterior = tipo;
  });

async function enviarNotificacionPush(titulo, mensaje) {
  try {
    await fetch("/.netlify/functions/sendPush", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ titulo, mensaje })
    });
  } catch(e) {
    console.error("Error enviando notificación:", e);
  }
}
  // ── Auth ───────────────────────────────────────────
  onAuthStateChanged(auth, user => {
    document.getElementById('loginPanel').style.display = user ? 'none'  : 'block';
    document.getElementById('alertPanel').style.display = user ? 'block' : 'none';
  });

  window.loginAdmin = async function() {
    const email    = document.getElementById('inputEmail').value.trim();
    const password = document.getElementById('inputPassword').value;
    const msgError = document.getElementById('msgError');
    const passInput = document.getElementById('inputPassword');
    msgError.style.display = 'none';
    try {
      await signInWithEmailAndPassword(auth, email, password);
    } catch (e) {
      passInput.classList.add('error-shake');
      msgError.style.display = 'block';
      setTimeout(() => passInput.classList.remove('error-shake'), 400);
    }
  };

  window.logoutAdmin = async function() {
    await signOut(auth);
  };

  window.enviarAlerta = async function(tipo) {
    if (!auth.currentUser) return;
    const now = new Date();
    const hora = now.toLocaleTimeString('es', {hour:'2-digit', minute:'2-digit'});
    await set(ref(db, 'alerta'), { tipo, hora, timestamp: Date.now() });
  };

  window.cancelarAlerta = async function() {
    if (!auth.currentUser) return;
    await set(ref(db, 'alerta'), { tipo: 'ninguno', hora: '', timestamp: Date.now() });
  };
